<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preparando Duelo - Olimpiadas Matemáticas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out;
      }
    </style>
  </head>

  <body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-2xl animate-fade-in-up">
      <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
        <div
          class="bg-gradient-to-br from-indigo-500 to-purple-700 text-white w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl"
        >
          <i class="fas fa-user-shield text-3xl"></i>
        </div>

        <h1 class="text-3xl md:text-4xl font-black text-gray-800 mb-3">
          Preparando el enfrentamiento
        </h1>

        <p class="text-gray-500 text-lg mb-6">
          El countdown visual se está mostrando en la pantalla pública.
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
          <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4">
            <p class="text-xs font-bold uppercase tracking-wide text-blue-600">
              Nivel
            </p>
            <p class="text-lg font-black text-gray-800 mt-2">
              {{ level }}
            </p>
          </div>

          <div class="bg-purple-50 border border-purple-100 rounded-2xl p-4">
            <p class="text-xs font-bold uppercase tracking-wide text-purple-600">
              Ronda
            </p>
            <p class="text-lg font-black text-gray-800 mt-2">
              {{ round|capitalize }}
            </p>
          </div>
        </div>

        <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5 mb-6">
          <div class="flex items-center justify-center gap-3">
            <i class="fas fa-hourglass-half text-indigo-600"></i>
            <p class="text-gray-700 font-semibold">
              Redirigiendo automáticamente al panel de validación...
            </p>
          </div>
        </div>

        <p class="text-sm text-gray-400">
          Equipos:
          <strong>{{ teams[0] }}</strong>
          vs
          <strong>{{ teams[1] }}</strong>
        </p>
      </div>
    </div>

    <script>
      const redirectUrl = "{{ url_for('quiz.quiz_question') }}";

      // Mantener esto sincronizado con la duración del countdown público
      const redirectDelayMs = 12000;

      setTimeout(() => {
        window.location.href = redirectUrl;
      }, redirectDelayMs);
    </script>
  </body>
</html>
