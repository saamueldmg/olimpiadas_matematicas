<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Comenzando el Quiz!</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="text-center">
        <h1 id="countdown-text" class="text-6xl sm:text-7xl md:text-8xl font-extrabold text-blue-600 transition-all duration-500 transform">
            Están listo?
        </h1>
    </div>

    <script>
        const textElement = document.getElementById('countdown-text');
        const messages = [
            "Están listos?",
            "Vamos a iniciar...",
            "3",
            "2",
            "1",
            "¡Adelante!"
        ];
        // Aquí se agrega un endpoint para obtener la URL de forma segura
        const redirectUrl = "/quiz-question";
        let messageIndex = 0;

        function updateMessage() {
            textElement.innerText = messages[messageIndex];
            messageIndex++;

            if (messageIndex < messages.length - 1) {
                // Change message and then update again
                setTimeout(updateMessage, 1500);
            } else if (messageIndex === messages.length - 1) {
                // Last message, wait before redirect
                setTimeout(() => {
                    textElement.classList.add('scale-150', 'opacity-0');
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 500); // Wait for the scaling transition to finish
                }, 1500);
            }
        }

        // Start the animation after a brief delay
        setTimeout(updateMessage, 1500);
    </script>
</body>
</html>
